<div class="container">

  <!-- Header -->
  <div class="header">
    <div>
      <h2>Verification & Approvals</h2>
      <p>Review and approve user registrations</p>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="card" *ngFor="let s of stats">
      <p>{{ s.title }}</p>
      <h2>{{ s.value }}</h2>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button 
      [class.active]="activeTab === 'therapists'"
      (click)="activeTab = 'therapists'">
      Therapist Applications
    </button>

    <button 
      [class.active]="activeTab === 'clients'"
      (click)="activeTab = 'clients'">
      Client Registrations
    </button>
  </div>

  <!-- Search -->
  <div class="search-bar">
    <input placeholder="Search applications..." />
  </div>

  <!-- Cards -->
  <div class="list">

    <div class="approval-card" *ngFor="let app of applications">

      <div class="left">
        <h3>{{ app.name }}</h3>
        <p>{{ app.specialty }}</p>

        <div class="info">
          <p>Email: {{ app.email }}</p>
          <p>Phone: {{ app.phone }}</p>
          <p>License: {{ app.license }}</p>
          <p>Experience: {{ app.experience }}</p>
          <p>Education: {{ app.education }}</p>
        </div>

        <span class="badge">Pending Review</span>
      </div>

      <div class="actions">
        <button class="outline">Review</button>
        <button class="approve">Approve</button>
        <button class="reject">Reject</button>
      </div>

    </div>

  </div>

</div>
