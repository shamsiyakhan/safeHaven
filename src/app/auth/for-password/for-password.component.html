<div class="forgot-page">
  <!-- LEFT SECTION -->
  <div class="left-section">
    <div class="form-wrapper">
      <!-- Back link -->
      <div class="back-link">
        <span class="arrow">←</span>
        <span [routerLink]="['/login']">Back to login</span>
      </div>

      <!-- Brand -->
      <div class="brand">SafeHaven</div>

      <!-- Title -->
      <h1 class="title">Forgot password?</h1>
      <p class="subtitle">No worries, we'll send you reset instructions</p>

      <!-- Form -->
      <form class="forgot-form" (ngSubmit)="onResetPassword()">
        <div class="form-group">
          <label for="email">Email</label>

          <div class="input-wrapper">
            <input
              id="email"
              type="email"
              [(ngModel)]="email"
              name="email"
              placeholder="Enter your email"
              required
            />
          </div>
        </div>

        <button type="submit" class="reset-btn">Reset password</button>
      </form>

      <!-- Bottom text -->
      <p class="signin-text">
        Remember your password?
        <a [routerLink]="['/login']">Sign in</a>
      </p>
    </div>
  </div>

  <!-- RIGHT SECTION -->
  <div class="right-section">
    <div class="overlay"></div>

    <div class="help-content">
      <h2>We're here to help</h2>

      <p>
        Your mental health journey is important to us. If you're having
        trouble accessing your account, we'll help you get back on track
        quickly and securely.
      </p>
    </div>
  </div>
</div>
